<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 소개 페이지</title>
    <style>
        table, th, td {
            border: 1px solid #c70c0c;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px, 20px;
        }
    </style>
</head>
<body>
    <h1>레드향</h1>
    <p>레드1</p>
    <p>레드<br>2</p>
    <p>레드3</p>
    <h2>레드향 샐러드 레시피</h2>
    <ol>
        <li>레드향 자르기</li>
        <li>샐러드 소스 넣기</li>
        <li>먹기</li>
    </ol>
    <h2>상품 구성</h2>
    <table>
        <caption>선물용과 가정용 상품 구성</caption>
        <tr>
            <th>용도</th>
            <th>중량</th>
            <th>개수</th>
            <th>가격</th>
        </tr>
        <tr>
            <td>선물용</td>
            <td>3kg</td>
            <td>11~16과</td>
            <td>35,000원</td>
        </tr>
        <tr>
            <td>선물용</td>
            <td>5kg</td>
            <td>18~26과</td>
            <td>52,000원</td>            
        </tr>
        <tr>
            <td>가정용</td>
            <td>3kg</td>
            <td>11~16과</td>
            <td>30,000원</td>
        </tr>
        <tr>
            <td>가정용</td>
            <td>5kg</td>
            <td>18~26과</td>
            <td>47,000원</td>
        </tr>                                
    </table>
</body>
</html>
